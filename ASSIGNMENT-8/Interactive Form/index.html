<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Form Validation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-wrapper">
            <h1>User Registration Form</h1>
            <div id="successMessage" class="success-message" style="display: none;">
                ✅ Form submitted successfully!
            </div>

            <form id="registrationForm" novalidate>
                <!-- Full Name Field -->
                <div class="form-group">
                    <label for="fullName">Full Name <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="fullName" 
                        name="fullName" 
                        placeholder="Enter your full name"
                        required
                    >
                    <span class="error-message" id="fullNameError"></span>
                </div>

                <!-- Email Field -->
                <div class="form-group">
                    <label for="email">Email Address <span class="required">*</span></label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                    <span class="error-message" id="emailError"></span>
                </div>

                <!-- Password Field -->
                <div class="form-group">
                    <label for="password">Password <span class="required">*</span></label>
                    <div class="password-wrapper">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="toggle-password" id="togglePassword" title="Show/Hide Password">
                            👁️
                        </button>
                    </div>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group">
                    <label for="confirmPassword">Confirm Password <span class="required">*</span></label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Re-enter your password"
                        required
                    >
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <!-- Phone Number Field -->
                <div class="form-group">
                    <label for="phone">Phone Number <span class="required">*</span></label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="Enter 10-digit phone number"
                        required
                    >
                    <span class="error-message" id="phoneError"></span>
                </div>

                <!-- Gender Field -->
                <div class="form-group">
                    <label>Gender <span class="required">*</span></label>
                    <div class="radio-group">
                        <div class="radio-option">
                            <input 
                                type="radio" 
                                id="male" 
                                name="gender" 
                                value="male"
                                required
                            >
                            <label for="male" class="radio-label">Male</label>
                        </div>
                        <div class="radio-option">
                            <input 
                                type="radio" 
                                id="female" 
                                name="gender" 
                                value="female"
                                required
                            >
                            <label for="female" class="radio-label">Female</label>
                        </div>
                        <div class="radio-option">
                            <input 
                                type="radio" 
                                id="other" 
                                name="gender" 
                                value="other"
                                required
                            >
                            <label for="other" class="radio-label">Other</label>
                        </div>
                    </div>
                    <span class="error-message" id="genderError"></span>
                </div>

                <!-- Terms & Conditions Checkbox -->
                <div class="form-group checkbox-group">
                    <div class="checkbox-wrapper">
                        <input 
                            type="checkbox" 
                            id="terms" 
                            name="terms"
                            required
                        >
                        <label for="terms" class="checkbox-label">
                            I agree to the Terms & Conditions <span class="required">*</span>
                        </label>
                    </div>
                    <span class="error-message" id="termsError"></span>
                </div>

                <!-- Form Buttons -->
                <div class="form-buttons">
                    <button type="submit" class="btn btn-submit">Submit</button>
                    <button type="reset" class="btn btn-reset">Reset</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
